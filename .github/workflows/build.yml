name: Build Executables

# 什么时候触发
on:
  push:
    branches: [leveling]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile \
            --windowed \
            --name ot3_leveling \
            --hidden-import "ot3_testing.leveling_test.config" \
            --hidden-import "ot3_testing.leveling_test.type" \
            --hidden-import "ot3_testing.leveling_test.model.base" \
            --hidden-import "ot3_testing.leveling_test.report.report" \
            --hidden-import "ot3_testing.hardware_control.hardware_control" \
            --hidden-import "ot3_testing.protocol.protocol_context" \
            --hidden-import "ot3_testing.maintenance_api.maintenance_run" \
            --add-data "ot3_testing/leveling_test/leveling_config.json:ot3_testing/leveling_test" \
            ot3_testing/main.py
          ls -lh dist/

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile `
            --windowed `
            --name ot3_leveling `
            --hidden-import "ot3_testing.leveling_test.config" `
            --hidden-import "ot3_testing.leveling_test.type" `
            --hidden-import "ot3_testing.leveling_test.model.base" `
            --hidden-import "ot3_testing.leveling_test.report.report" `
            --hidden-import "ot3_testing.hardware_control.hardware_control" `
            --hidden-import "ot3_testing.protocol.protocol_context" `
            --hidden-import "ot3_testing.maintenance_api.maintenance_run" `
            --add-data "ot3_testing/leveling_test/leveling_config.json;ot3_testing/leveling_test" `
            ot3_testing/main.py
          dir dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ot3_leveling-${{ runner.os }}
          path: dist/
